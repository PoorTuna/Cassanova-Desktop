appId: com.poortuna.cassanova-desktop
productName: Cassanova Desktop
copyright: Copyright © 2026 PoorTuna

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/*.map'

asarUnpack:
  - node_modules/keytar/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  # Code signing: provide WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD as repo secrets
  # to sign the NSIS installer in CI. Without them the artifact is unsigned.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  hardenedRuntime: true
  # Notarization runs automatically when APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD +
  # APPLE_TEAM_ID env vars are present alongside the Developer ID cert
  # (MAC_CSC_LINK + MAC_CSC_KEY_PASSWORD).

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
    - target: pacman
      arch: [x64]
    - target: snap
      arch: [x64]
    - target: tar.xz
      arch: [x64]
  category: Development
  synopsis: Lens-style desktop client for managing multiple Cassanova instances
  description: |
    Cassanova Desktop is a multi-instance shell for Cassanova deployments.
    It manages credentials in the OS keychain, pins TLS certificates per
    instance, and renders each instance in an isolated Electron partition.

rpm:
  fpm:
    - --rpm-rpmbuild-define=_build_id_links none

snap:
  confinement: strict
  grade: stable
  plugs:
    - default
    - password-manager-service

publish:
  provider: github
  owner: PoorTuna
  repo: Cassanova-Desktop
