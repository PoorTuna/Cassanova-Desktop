appId: com.poortuna.cassanova-desktop
productName: Cassanova Desktop
copyright: Copyright © 2026 PoorTuna

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/*.map'

asarUnpack:
  - node_modules/keytar/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  # Phase 4: Azure Trusted Signing wired here

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  # Phase 4: Apple Developer ID + notarization wired here
  hardenedRuntime: true

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

publish:
  provider: github
  owner: PoorTuna
  repo: Cassanova-Desktop
