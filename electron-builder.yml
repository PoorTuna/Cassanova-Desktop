appId: com.poortuna.cassanova-desktop
productName: Cassanova Desktop
copyright: Copyright © 2026 PoorTuna

directories:
  output: release/${version}
  buildResources: build

files:
  - out/**/*
  - package.json
  - '!**/*.map'

asarUnpack:
  - node_modules/keytar/**/*

win:
  icon: build/icon-square.png
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

portable:
  artifactName: ${productName}-${version}-portable.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  identity: null

linux:
  icon: build/icon-square.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
    - target: pacman
      arch: [x64]
    - target: tar.xz
      arch: [x64]
  category: Development
  maintainer: PoorTuna
  synopsis: Desktop client for managing multiple Cassanova instances
  description: |
    Cassanova Desktop is a multi-instance shell for Cassanova deployments.
    It manages credentials in the OS keychain, pins TLS certificates per
    instance, and renders each instance in an isolated Electron partition.

rpm:
  fpm:
    - --rpm-rpmbuild-define=_build_id_links none

publish:
  provider: github
  owner: PoorTuna
  repo: Cassanova-Desktop
